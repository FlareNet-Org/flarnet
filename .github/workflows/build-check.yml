name: Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Vite requires modern Node versions
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Check Build
      run: npm run build
      env:
        # Provide fallback environment variables so the build doesn't crash
        VITE_API_BASE_URL: "http://localhost:5000"
